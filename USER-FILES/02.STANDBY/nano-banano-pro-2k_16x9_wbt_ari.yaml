# Replicate Profile 

# Model endpoint (required)
endpoint: "google/nano-banana-pro"

# Pricing information (optional, for cost tracking)
pricing:
  base_cost: 0.14
  currency: "USD"

# Model parameters (required) - all parameters passed through to API
parameters:
  num_images: 1
  aspect_ratio: "16:9"
  output_format: "png"
  resolution: "2K"
  safety_filter_level: "block_only_high"

image_input: "https://f003.backblazeb2.com/file/wbt-bucket/references/ari_foldman.png"

# Processing options (optional)
delay_between_requests: 1.0

# Fixes
prompt_prefix: 'Create an exact, photorealistic version of the provided drawing. The  drawing is suppose to depict a man in Israel called Ari Foldman in 2008. The drawing depicts '
prompt_suffix: 'Provided image ari_foldman.png show what Ari Foldman actually looks like. The created image should look like it was shot on 35mm film by Roger Deakins.'
