# FAL.ai Profile 

# Model endpoint (required)
endpoint: "google/nano-banana"

# Description for reports (optional)
description: "Gemini 2.5 Flash Image - Nano Banana"

# Pricing information (optional, for cost tracking)
pricing:
  base_cost: 0.039
  currency: "USD"

# Model parameters (required) - all parameters passed through to API
parameters:
  num_images: 1
  image_input: "https://f003.backblazeb2.com/file/aspect-ratio-reference/aspect_ratio_reference_16x9.png"
  output_format: "png"

# Fixes
prompt_prefix: ''
prompt_suffix: 'Make the aspect ratio of the generated image the same as attached image called "aspect_ratio_reference_16x9.png"'
