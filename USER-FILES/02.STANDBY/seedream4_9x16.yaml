# ByteDance SeeDream 4 Profile

# Model endpoint (required)
model_id: "bytedance/seedream-4"

# Description for reports (optional)
description: "ByteDance SeeDream 4 - High-quality text-to-image generation"

# Pricing information (optional, for cost tracking)
# Note: Update with actual pricing when available
pricing:
  base_cost: 0.05
  currency: "USD"

# Model parameters (required) - all parameters passed through to API
parameters:
  size: "custom"
  width: 1080
  height: 1920
  max_images: 1
  aspect_ratio: "9:16"
  sequential_image_generation: "disabled"
  image_input: ''  # Leave empty for text-to-image, or provide URL for image-to-image
  output_format: "png"

# Prompt modifications (optional)
prompt_prefix: ''
prompt_suffix: ''

# Rate limiting (optional)
delay_between_requests: 0
