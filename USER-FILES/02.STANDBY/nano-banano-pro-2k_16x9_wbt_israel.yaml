# Replicate Profile 

# Model endpoint (required)
endpoint: "google/nano-banana-pro"

# Pricing information (optional, for cost tracking)
pricing:
  base_cost: 0.14
  currency: "USD"

# Model parameters (required) - all parameters passed through to API
parameters:
  num_images: 1
  aspect_ratio: "16:9"
  output_format: "png"
  resolution: "2K"
  safety_filter_level: "block_only_high"

image_input: ""

# Processing options (optional)
delay_between_requests: 1.0

# Fixes
prompt_prefix: 'Create an exact, photorealistic version of the provided drawing. The the drawing is suppose to depict life in Israel in the early 1980s. The drawing depicts '
prompt_suffix: 'The created image should look like it was shot on 35mm film by Roger Deakins.'
